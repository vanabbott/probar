apiVersion: v1
kind: ConfigMap
metadata:
  name: buildkitd-config
  namespace: ci
data:
  buildkitd.toml: |
    # buildkitd configuration. See:
    # https://github.com/moby/buildkit/blob/master/docs/buildkitd.toml.md

    debug = false

    [worker.oci]
      enabled = true
      # Required when running rootless with seccomp Unconfined and no userns sandbox.
      # The rootless StatefulSet sets --oci-worker-no-process-sandbox to match.

    [worker.containerd]
      enabled = false

    # Trust the internal CA for harbor.k8s.home. The CA file is mounted from
    # the `harbor-ca` ConfigMap into /etc/buildkit/certs/.
    [registry."harbor.k8s.home"]
      ca = ["/etc/buildkit/certs/ca.crt"]

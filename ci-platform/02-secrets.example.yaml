# =====================================================================
# Example/template secrets. DO NOT COMMIT REAL VALUES.
# Replace the placeholders, then `kubectl apply -f` the result.
# Better: manage these via SealedSecrets, External Secrets Operator, or
# whatever you already use in your gitops repo.
# =====================================================================

# ---------------------------------------------------------------------
# Harbor docker registry credentials.
# Create a Harbor "robot account" scoped to the `probar` project with
# push permission, and use those credentials here (NOT your personal
# admin login).
# ---------------------------------------------------------------------
# To generate the dockerconfigjson value:
#
#   kubectl create secret docker-registry harbor-dockerconfig \
#     --namespace=ci \
#     --docker-server=harbor.k8s.home \
#     --docker-username='robot$probar+ci-pusher' \
#     --docker-password='<robot-account-token>' \
#     --dry-run=client -o yaml
#
# (the `--dry-run=client -o yaml` form lets you commit it via SealedSecrets)
---
apiVersion: v1
kind: Secret
metadata:
  name: harbor-dockerconfig
  namespace: ci
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: PFJFUExBQ0VfTUU+   # base64('<REPLACE_ME>')

---
# ---------------------------------------------------------------------
# Cosign signing key.
# Generate a keypair locally with:
#
#   COSIGN_PASSWORD='<choose-a-password>' cosign generate-key-pair
#
# This produces cosign.key (private, encrypted) and cosign.pub (public).
# Distribute cosign.pub for verification; keep cosign.key secret.
# ---------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: cosign-key
  namespace: ci
type: Opaque
stringData:
  cosign.key: |
    -----BEGIN ENCRYPTED COSIGN PRIVATE KEY-----
    REPLACE_ME
    -----END ENCRYPTED COSIGN PRIVATE KEY-----
  cosign.pub: |
    -----BEGIN PUBLIC KEY-----
    REPLACE_ME
    -----END PUBLIC KEY-----
  password: REPLACE_ME

---
# ---------------------------------------------------------------------
# Harbor API token for the scan gate.
# Use the same robot account as above (Harbor robot tokens work for both
# registry push AND API access). The scan-gate step uses Basic auth.
# ---------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: harbor-api
  namespace: ci
type: Opaque
stringData:
  username: 'robot$probar+ci-pusher'
  password: 'REPLACE_ME'

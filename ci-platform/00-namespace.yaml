apiVersion: v1
kind: Namespace
metadata:
  name: ci
  labels:
    # If you have Kyverno/Gatekeeper PSA enforcement, this lets the rootless
    # buildkitd pod run with the seccomp/userns config it needs.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline

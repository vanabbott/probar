apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
  - group: gateway.networking.k8s.io	
    kind: Gateway	
    name: home-gateway
    namespace: traefik
  hostnames:
    - {{ .Release.Name }}.k8s.home
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Release.Name }}
          port: 80
          weight: 1
          kind: Service
          group: ''